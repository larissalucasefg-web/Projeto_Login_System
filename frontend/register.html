<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <link rel="stylesheet" href="./css/style_register.css">
     <link href="https://fonts.googleapis.com/css2?family=Vampiro+One&display=swap" rel="stylesheet">
</head>

<body>
    <!-- lado esquerdo -->
    <main class="register-wrapper">
        <header class="register_info">
            <h1>Criar Conta</h1>
            <p>Preencha os dados para se cadastrar no sistema</p>

            <span>Já possui conta?</span>
            <a href="./index.html">Voltar para o login</a>
        </header>
        <section class="register-card">
            <form id="registerForm">
                <div class="input-group">
                    <label>Nome completo</label> 
                    <input type="text" placeholder="Digite seu nome">
                </div>

                <div class="input-group">
                    <label for="email">Email</label> 
                    <input id="email" type="email" placeholder="Digite seu email">
                </div>

                <div class="input-group">
                    <label>Senha</label> 
                    <input type="password" placeholder="Digite sua senha">
                </div>

                <div class="input-group">
                    <label>Confirmar Senha</label> 
                    <input type="password" placeholder="Repita a senha">
                </div>


                    <button type="submit">Cadastrar</button>

            
            </form>
        </section>
    </main>
</body>
</html>
